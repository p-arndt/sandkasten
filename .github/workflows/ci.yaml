name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install deps
        run: go mod download

      - name: Run unit tests 
        run: go test ./... -v

      - name: Run static check
        run: go vet ./...
