name: Build and Publish Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags: ["*"]

jobs:
  build-binaries:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          echo "Tag version: $(git describe --tags --abbrev=0)"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          VERSION: ${{ steps.get_tag.outputs.VERSION }}
        run: |
          mkdir -p binaries
          
          # use musl to produce static linux binary
          export CC=musl-gcc
          export LDFLAGS="-linkmode=external -extldflags=-static"
          
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION} ${LDFLAGS}" \
            -o binaries/sandkasten-linux-amd64 \
            ./cmd/sandkasten

      - uses: actions/upload-artifact@v4
        with:
          name: sandkasten-linux-amd64
          path: binaries/sandkasten-linux-amd64
          retention-days: 7

  build-docker:
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.get_tag.outputs.VERSION }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/sandkasten:${{ steps.get_tag.outputs.VERSION }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/sandkasten:latest
            ghcr.io/${{ github.repository_owner }}/sandkasten:${{ steps.get_tag.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/sandkasten:latest
          cache-to: type=inline

  build-ts-sdk:
    runs-on: ubuntu-latest
    needs: [build-binaries]
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          echo "Tag version: $(git describe --tags --abbrev=0)"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node and pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript compile
        run: pnpm run build

      - name: Run SDK tests
        run: pnpm run test

      - name: Publish TS SDK to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # update package.json version to match tag before publishing
          pnpm version "${{ steps.get_tag.outputs.VERSION }}" --no-git-tag-version
          pnpm publish --access public

  create-release:
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker, build-ts-sdk]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Install git-chglog
        run: |
          curl -sSL https://github.com/git-chglog/git-chglog/releases/download/v0.15.4/git-chglog_0.15.4_linux_amd64.tar.gz \
            | tar -xz
          sudo mv git-chglog /usr/local/bin/

      - name: Generate changelog
        run: |
          CUR=${{ steps.get_tag.outputs.VERSION }}
          echo "## 🚀 Release $CUR" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git-chglog $CUR >> RELEASE_NOTES.md

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: "sandkasten-*"
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

