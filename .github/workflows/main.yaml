name: Build and Publish Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags: ["*"]

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: dorcs-linux-amd64
          - goos: windows
            goarch: amd64
            binary_name: dorcs-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          echo "Tag version: $(git describe --tags --abbrev=0)"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-mingw-w64-x86-64

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          VERSION: ${{ steps.get_tag.outputs.VERSION }}
        run: |
          mkdir -p binaries
          
          # Set C compiler and linker flags based on target platform
          if [ "${{ matrix.goos }}" = "linux" ]; then
            export CC=musl-gcc
            export LDFLAGS="-linkmode=external -extldflags=-static"
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            export CC=x86_64-w64-mingw32-gcc
            export LDFLAGS="-extldflags=-static"
          fi
          
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION} ${LDFLAGS}" \
            -o binaries/${{ matrix.binary_name }} \
            ./cmd/dorcs

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: binaries/${{ matrix.binary_name }}
          retention-days: 7

  build-docker:
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.get_tag.outputs.VERSION }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/dorcs:${{ steps.get_tag.outputs.VERSION }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/dorcs:latest
            ghcr.io/${{ github.repository_owner }}/dorcs:${{ steps.get_tag.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/dorcs:latest
          cache-to: type=inline

  create-release:
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get tag
        id: get_tag
        run: |
          echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Install git-chglog
        run: |
          curl -sSL https://github.com/git-chglog/git-chglog/releases/download/v0.15.4/git-chglog_0.15.4_linux_amd64.tar.gz \
            | tar -xz
          sudo mv git-chglog /usr/local/bin/

      - name: Generate changelog
        run: |
          CUR=${{ steps.get_tag.outputs.VERSION }}
          echo "## 🚀 Release $CUR" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git-chglog $CUR >> RELEASE_NOTES.md

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: "dorcs-*"
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

